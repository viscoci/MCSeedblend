modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/bondigi/seedblend/issues"

[[mods]]
modId = "seedblend"
version = "${version}"
displayName = "SeedBlend"
description = '''
Reseed an existing world for future terrain while preserving generated chunks,
blended with Minecraft's native terrain blending.
'''
authors = "Bondigi Games"

[[mixins]]
config = "seedblend.mixins.json"

[[dependencies.seedblend]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.seedblend]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.21.2)"
ordering = "NONE"
side = "BOTH"
